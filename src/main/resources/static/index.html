<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Snip — URL Shortener</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg:        #0a0a0f;
          --surface:   #13131a;
          --border:    #222230;
          --accent:    #6c63ff;
          --accent-dim:#3d3880;
          --success:   #22c55e;
          --error:     #ef4444;
          --text:      #e8e8f0;
          --muted:     #6b6b80;
          --radius:    12px;
        }

        body {
          background: var(--bg);
          color: var(--text);
          font-family: 'Inter', sans-serif;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 0 1rem;
        }

        /* ── Header ── */
        header {
          width: 100%;
          max-width: 680px;
          padding: 2.5rem 0 0;
          display: flex;
          align-items: center;
          gap: .75rem;
        }

        .logo-mark {
          width: 36px; height: 36px;
          background: var(--accent);
          border-radius: 8px;
          display: grid; place-items: center;
          flex-shrink: 0;
        }
        .logo-mark svg { width: 20px; height: 20px; fill: #fff; }

        .logo-text {
          font-family: 'Space Grotesk', sans-serif;
          font-size: 1.25rem;
          font-weight: 700;
          letter-spacing: -.02em;
          color: #fff;
        }

        /* ── Hero ── */
        .hero {
          width: 100%;
          max-width: 680px;
          padding: 4rem 0 2rem;
          text-align: center;
        }

        .hero h1 {
          font-family: 'Space Grotesk', sans-serif;
          font-size: clamp(2rem, 6vw, 3rem);
          font-weight: 700;
          line-height: 1.1;
          letter-spacing: -.03em;
          color: #fff;
          margin-bottom: .75rem;
        }

        .hero h1 span {
          background: linear-gradient(135deg, var(--accent), #a78bfa);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }

        .hero p {
          color: var(--muted);
          font-size: 1rem;
          line-height: 1.6;
        }

        /* ── Card ── */
        .card {
          width: 100%;
          max-width: 680px;
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          padding: 2rem;
          margin-bottom: 1.5rem;
        }

        .input-row {
          display: flex;
          gap: .75rem;
          align-items: stretch;
        }

        input[type="url"] {
          flex: 1;
          background: var(--bg);
          border: 1px solid var(--border);
          border-radius: 8px;
          color: var(--text);
          font-family: 'Inter', sans-serif;
          font-size: .95rem;
          padding: .75rem 1rem;
          outline: none;
          transition: border-color .2s;
        }
        input[type="url"]::placeholder { color: var(--muted); }
        input[type="url"]:focus { border-color: var(--accent); }

        button.shorten-btn {
          background: var(--accent);
          color: #fff;
          border: none;
          border-radius: 8px;
          font-family: 'Inter', sans-serif;
          font-size: .9rem;
          font-weight: 600;
          padding: .75rem 1.5rem;
          cursor: pointer;
          white-space: nowrap;
          transition: background .2s, transform .1s;
          display: flex; align-items: center; gap: .5rem;
        }
        button.shorten-btn:hover  { background: #5a52e0; }
        button.shorten-btn:active { transform: scale(.97); }
        button.shorten-btn:disabled { background: var(--accent-dim); cursor: not-allowed; }

        .spinner {
          width: 16px; height: 16px;
          border: 2px solid rgba(255,255,255,.3);
          border-top-color: #fff;
          border-radius: 50%;
          animation: spin .6s linear infinite;
          display: none;
        }
        button.shorten-btn.loading .spinner { display: block; }
        button.shorten-btn.loading .btn-label { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Result ── */
        .result {
          margin-top: 1.25rem;
          display: none;
        }
        .result.visible { display: block; }

        .result-label {
          font-size: .75rem;
          font-weight: 500;
          letter-spacing: .08em;
          text-transform: uppercase;
          color: var(--muted);
          margin-bottom: .5rem;
        }

        .result-row {
          display: flex;
          align-items: center;
          gap: .75rem;
          background: var(--bg);
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: .75rem 1rem;
        }

        .result-url {
          flex: 1;
          font-size: .95rem;
          color: var(--accent);
          text-decoration: none;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .result-url:hover { text-decoration: underline; }

        button.copy-btn {
          background: transparent;
          border: 1px solid var(--border);
          border-radius: 6px;
          color: var(--muted);
          font-size: .8rem;
          font-weight: 500;
          font-family: 'Inter', sans-serif;
          padding: .35rem .75rem;
          cursor: pointer;
          transition: all .2s;
          white-space: nowrap;
        }
        button.copy-btn:hover  { border-color: var(--accent); color: var(--accent); }
        button.copy-btn.copied { border-color: var(--success); color: var(--success); }

        /* ── Error ── */
        .error-msg {
          margin-top: 1rem;
          display: none;
          align-items: center;
          gap: .5rem;
          color: var(--error);
          font-size: .875rem;
        }
        .error-msg.visible { display: flex; }

        /* ── History ── */
        .section-label {
          width: 100%;
          max-width: 680px;
          font-size: .75rem;
          font-weight: 500;
          letter-spacing: .08em;
          text-transform: uppercase;
          color: var(--muted);
          margin-bottom: .75rem;
        }

        .history {
          width: 100%;
          max-width: 680px;
          display: flex;
          flex-direction: column;
          gap: .5rem;
          margin-bottom: 3rem;
        }

        .history-item {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          padding: 1rem 1.25rem;
          display: flex;
          align-items: center;
          gap: 1rem;
          animation: fadeIn .3s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

        .history-item .original {
          flex: 1;
          font-size: .8rem;
          color: var(--muted);
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .history-item .short {
          font-size: .875rem;
          color: var(--accent);
          text-decoration: none;
          white-space: nowrap;
        }
        .history-item .short:hover { text-decoration: underline; }

        button.copy-small {
          background: transparent;
          border: 1px solid var(--border);
          border-radius: 5px;
          color: var(--muted);
          font-size: .75rem;
          font-family: 'Inter', sans-serif;
          padding: .25rem .6rem;
          cursor: pointer;
          transition: all .2s;
        }
        button.copy-small:hover  { border-color: var(--accent); color: var(--accent); }
        button.copy-small.copied { border-color: var(--success); color: var(--success); }

        .empty-history {
          text-align: center;
          color: var(--muted);
          font-size: .875rem;
          padding: 1.5rem;
          border: 1px dashed var(--border);
          border-radius: var(--radius);
        }

        /* ── Footer ── */
        footer {
          margin-top: auto;
          padding: 1.5rem 0;
          color: var(--muted);
          font-size: .8rem;
          text-align: center;
        }

        @media (max-width: 480px) {
          .input-row { flex-direction: column; }
          button.shorten-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
    </div>
    <span class="logo-text">Snip</span>
</header>

<section class="hero">
    <h1>Long URLs,<br/><span>short links</span></h1>
    <p>Paste any URL and get a clean, shareable link in seconds.</p>
</section>

<div class="card">
    <div class="input-row">
        <input type="url" id="urlInput" placeholder="https://your-long-url.com/goes/here" autocomplete="off"/>
        <button class="shorten-btn" id="shortenBtn" onclick="shortenUrl()">
            <div class="spinner"></div>
            <span class="btn-label">Shorten</span>
        </button>
    </div>

    <div class="error-msg" id="errorMsg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <span id="errorText">Something went wrong.</span>
    </div>

    <div class="result" id="result">
        <div class="result-label">Your short link</div>
        <div class="result-row">
            <a class="result-url" id="resultUrl" href="#" target="_blank"></a>
            <button class="copy-btn" id="copyBtn" onclick="copyResult()">Copy</button>
        </div>
    </div>
</div>

<div class="section-label" id="historyLabel" style="display:none">Recent links</div>
<div class="history" id="history"></div>

<footer>Built with Spring Boot · Redis · MySQL</footer>

<script>
    // ── CONFIG ──────────────────────────────────────────────────────────────
    // Change this to your deployed backend URL when you deploy.
    // For local Docker testing use: http://localhost:8080
    const API_BASE = window.location.origin;
    // ────────────────────────────────────────────────────────────────────────

    const history = [];

    async function shortenUrl() {
      const input = document.getElementById('urlInput');
      const btn   = document.getElementById('shortenBtn');
      const url   = input.value.trim();

      hideResult();
      hideError();

      if (!url) { showError('Please enter a URL.'); return; }
      if (!isValidUrl(url)) { showError('Please enter a valid URL starting with http:// or https://'); return; }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/api/shorten`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ originalUrl: url })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || `Server error: ${res.status}`);
        }

        const data = await res.json();
        const shortUrl = `${API_BASE}/api/${data.shortCode}`;

        showResult(shortUrl);
        addToHistory(url, shortUrl);
        input.value = '';

      } catch (e) {
        if (e.name === 'TypeError') {
          showError('Cannot reach the server. Make sure the backend is running.');
        } else {
          showError(e.message);
        }
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function showResult(shortUrl) {
      const resultEl  = document.getElementById('result');
      const resultUrl = document.getElementById('resultUrl');
      resultUrl.href        = shortUrl;
      resultUrl.textContent = shortUrl;
      resultEl.classList.add('visible');
    }

    function hideResult() {
      document.getElementById('result').classList.remove('visible');
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    function copyResult() {
      const url = document.getElementById('resultUrl').textContent;
      copyToClipboard(url, document.getElementById('copyBtn'));
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    function addToHistory(original, short) {
      history.unshift({ original, short });
      if (history.length > 5) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const container = document.getElementById('history');
      const label     = document.getElementById('historyLabel');

      if (history.length === 0) {
        label.style.display = 'none';
        container.innerHTML = '';
        return;
      }

      label.style.display = 'block';
      container.innerHTML = history.map((item, i) => `
        <div class="history-item">
          <span class="original" title="${item.original}">${item.original}</span>
          <a class="short" href="${item.short}" target="_blank">${item.short}</a>
          <button class="copy-small" onclick="copySmall(this, '${item.short}')">Copy</button>
        </div>
      `).join('');
    }

    function copySmall(btn, text) {
      copyToClipboard(text, btn);
    }

    function isValidUrl(str) {
      try { const u = new URL(str); return u.protocol === 'http:' || u.protocol === 'https:'; }
      catch { return false; }
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenUrl();
    });
</script>
</body>
</html>
